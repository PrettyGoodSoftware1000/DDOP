<!DOCTYPE html>
<!-- Drug, Dragon or Pokémon — Biopsy v3
     Static site for GitHub Pages. Big screen = host (open the bare URL).
     Phones join via ?room=CODE (the QR code points here).
     Needs in the repo root: names.txt, wutdis.txt, tips.txt, and your Firebase config below.
     Question data is read live from a public Google Sheet (SHEET_ID constant).
     Optional sounds in root/sounds/: dragon01.mp3, dragon02.mp3 … (also pokemonNN.mp3, drugNN.mp3)
     play on each round reveal; final.mp3 plays on the final scoreboard. All play on host + phones.
     Preview the look without Firebase: open with ?demo=host or ?demo=phone -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Drug, Dragon or Pokémon</title>

<!-- ===== Third-party libs (CDN, loaded as classic globals: XLSX, QRCode) ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold1:#f7d774; --gold2:#e0a52a; --gold3:#b9821a;
  --ink:#1a1430;
  --drug:#9b59d0; --drug2:#6c3fb5;
  --dragon:#f3902f; --dragon2:#d96a16;
  --poke:#ef4655; --poke2:#c1121f;
  --frame:#4f5bd5; --frame2:#343c8f;
  --ok:#3ddc84; --ok2:#16a35a;
  --paper:#efe9f7;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Nunito',system-ui,sans-serif; color:#fff;
  background:
    radial-gradient(1200px 700px at 50% -10%, #3a2a66 0%, transparent 60%),
    radial-gradient(900px 600px at 50% 120%, #2a1c52 0%, transparent 60%),
    linear-gradient(160deg,#241a3d,#0f0a1f);
  min-height:100%;
}
h1,h2,h3,.display{font-family:'Lilita One',cursive;font-weight:400;letter-spacing:.5px}
.wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:16px}
.hidden{display:none !important}
.muted{opacity:.7}
.center{text-align:center}

/* ---- Title lockup ---- */
.logo{font-family:'Lilita One';text-align:center;line-height:.95;text-shadow:0 3px 0 rgba(0,0,0,.35)}
.logo .ddp{font-size:clamp(30px,6vw,64px)}
.logo .ddp b{color:var(--dragon)} .logo .ddp i{font-style:normal;color:var(--drug)} .logo .ddp u{text-decoration:none;color:var(--poke)}
.logo .sub{font-family:'Nunito';font-weight:900;letter-spacing:3px;opacity:.7;font-size:13px;margin-top:6px;text-transform:uppercase}

/* ---- Trading card ---- */
.card{
  position:relative;width:min(86vw,340px);aspect-ratio:2.5/3.5;border-radius:20px;padding:12px;
  background:linear-gradient(150deg,var(--gold1),var(--gold2) 48%,var(--gold3));
  box-shadow:0 22px 50px rgba(0,0,0,.55), inset 0 0 0 2px rgba(255,255,255,.35);
}
.card.big{width:min(92vw,440px)}
.card-inner{
  position:relative;height:100%;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;
  background:linear-gradient(160deg,var(--frame),var(--frame2));
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.18);overflow:hidden;
}
.card.type-drug   .card-inner{background:linear-gradient(160deg,var(--drug),var(--drug2))}
.card.type-dragon .card-inner{background:linear-gradient(160deg,var(--dragon),var(--dragon2))}
.card.type-poke   .card-inner{background:linear-gradient(160deg,var(--poke),var(--poke2))}
.card-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.card-name{font-family:'Lilita One';font-size:clamp(18px,2.6vw,24px);text-shadow:0 2px 0 rgba(0,0,0,.25)}
.card-hp{font-family:'Lilita One';font-size:18px;color:#ffe9a8}
.card-hp small{font-size:11px;opacity:.8}
.art{
  flex:1;border-radius:9px;border:3px solid rgba(0,0,0,.28);padding:12px;color:var(--ink);
  background:
    radial-gradient(120% 90% at 50% 18%, #ffffff 0%, #efe7fb 55%, #d9cdf0 100%);
  display:flex;align-items:center;justify-content:center;text-align:center;
}
.art .mystery{font-family:'Lilita One';font-size:clamp(26px,7.5vw,58px);line-height:1.04;color:var(--ink)}
.eyebrow{font-family:'Lilita One';font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:.9}
.card-foot{font-size:12px;opacity:.85;text-align:center}
/* foil sheen */
.card::after{
  content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;mix-blend-mode:overlay;
  background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.5) 48%,transparent 64%);
  background-size:300% 300%;animation:foil 7s linear infinite;
}
@keyframes foil{0%{background-position:0% 0%}100%{background-position:300% 300%}}
@media (prefers-reduced-motion:reduce){.card::after{animation:none}}

/* ---- Buttons ---- */
.btn{font-family:'Lilita One';border:none;border-radius:14px;padding:14px 20px;font-size:18px;color:#fff;cursor:pointer;
  box-shadow:0 6px 0 rgba(0,0,0,.28);transition:transform .08s,box-shadow .08s,filter .15s;background:linear-gradient(#6b6bf0,#454bb0)}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.28)}
.btn[disabled]{filter:grayscale(.6) brightness(.8);cursor:not-allowed;box-shadow:0 6px 0 rgba(0,0,0,.28)}
.btn.ghost{background:rgba(255,255,255,.12);box-shadow:0 6px 0 rgba(0,0,0,.2)}

/* type answer badges (phone) */
.badges{display:grid;grid-template-columns:1fr;gap:12px;width:min(92vw,420px)}
.badge{font-family:'Lilita One';border:none;border-radius:16px;padding:18px;font-size:22px;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 7px 0 rgba(0,0,0,.3);
  transition:transform .08s,box-shadow .08s,filter .12s;position:relative}
.badge .dot{width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.18);display:grid;place-items:center;font-size:16px}
.badge:active{transform:translateY(3px);box-shadow:0 4px 0 rgba(0,0,0,.3)}
.badge.drug{background:linear-gradient(var(--drug),var(--drug2))}
.badge.dragon{background:linear-gradient(var(--dragon),var(--dragon2))}
.badge.poke{background:linear-gradient(var(--poke),var(--poke2))}
.badge[aria-pressed="true"]{outline:4px solid #fff;filter:brightness(1.12) saturate(1.18)}
.badge[aria-pressed="true"] .dot{background:#fff;color:#222}
.submit{font-family:'Lilita One';width:min(92vw,420px);border:none;border-radius:16px;padding:18px;font-size:24px;color:#fff;cursor:pointer;
  background:linear-gradient(var(--ok),var(--ok2));box-shadow:0 7px 0 rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;gap:10px}
.submit:active{transform:translateY(3px);box-shadow:0 4px 0 rgba(0,0,0,.3)}
.submit[disabled]{filter:grayscale(.5) brightness(.85)}

/* ---- Host layout ---- */
.host-grid{display:flex;gap:28px;align-items:center;justify-content:center;flex-wrap:wrap;width:100%}
.panel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:20px;backdrop-filter:blur(6px)}
.qrbox{background:#fff;padding:14px;border-radius:14px;display:inline-block}
.qrbox img,.qrbox canvas{display:block;border-radius:6px}
.code{font-family:'Lilita One';font-size:clamp(34px,6vw,58px);letter-spacing:6px;color:var(--gold1);text-shadow:0 3px 0 rgba(0,0,0,.35)}
.players{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:560px}
.chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  border-radius:999px;padding:8px 14px;font-weight:900}
.chip .tick{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:13px;background:rgba(255,255,255,.15)}
.chip.ok .tick{background:var(--ok);color:#062}
.count{font-family:'Lilita One';font-size:40px}
.count small{font-family:'Nunito';font-weight:900;font-size:15px;opacity:.7}

/* answered pips */
.pips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:560px}
.pip{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.18)}
.pip.on{background:var(--ok)}

/* reveal labels */
.answer-tags{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.tag{font-family:'Lilita One';padding:10px 18px;border-radius:12px;font-size:20px;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.25)}
.tag.drug{background:linear-gradient(var(--drug),var(--drug2))}
.tag.dragon{background:linear-gradient(var(--dragon),var(--dragon2))}
.tag.poke{background:linear-gradient(var(--poke),var(--poke2))}
.tag.none{background:linear-gradient(#8b95a7,#5b6473)}

/* leaderboard */
.board{display:flex;flex-direction:column;gap:10px;width:min(94vw,560px)}
.row{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:12px 16px;font-weight:900;font-size:20px}
.row .rank{font-family:'Lilita One';width:38px;text-align:center;font-size:24px;opacity:.85}
.row .pts{margin-left:auto;font-family:'Lilita One';color:var(--gold1);font-size:24px}
.row.first{background:linear-gradient(120deg,rgba(247,215,116,.28),rgba(224,165,42,.18));border-color:var(--gold2)}
.row.first .rank{color:var(--gold1);opacity:1}

/* reveal: name beside the answer + animated running totals */
.reveal-answer{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;text-align:center}
.reveal-name{font-family:'Lilita One';font-size:clamp(30px,6.5vw,56px);text-shadow:0 3px 0 rgba(0,0,0,.35)}
.reveal-was{font-family:'Nunito';font-weight:900;opacity:.6;text-transform:uppercase;letter-spacing:2px;font-size:14px}
.scoreboard{width:min(94vw,560px)}
.scoreboard .pname{flex:0 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scoreboard .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.scoreboard .right .pts{margin-left:0;min-width:64px;text-align:right;font-variant-numeric:tabular-nums}
.scoreboard .delta{font-family:'Lilita One';color:var(--ok);font-size:16px}

/* rounds stepper on the launch screen */
.rounds{display:flex;align-items:center;justify-content:center;gap:14px}
.rounds .step{font-family:'Lilita One';width:46px;height:46px;border-radius:12px;border:none;cursor:pointer;font-size:26px;color:#fff;
  background:linear-gradient(#6b6bf0,#454bb0);box-shadow:0 5px 0 rgba(0,0,0,.28);line-height:1}
.rounds .step:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.28)}
.rounds .step[disabled]{filter:grayscale(.6) brightness(.7);cursor:not-allowed}
.rounds-val{display:flex;flex-direction:column;align-items:center;min-width:84px}
.rounds-val b{font-family:'Lilita One';font-size:40px;line-height:1;color:var(--gold1)}
.rounds-val small{font-weight:900;opacity:.6;text-transform:uppercase;letter-spacing:1px;font-size:12px}

/* tips ticker */
.tips{display:flex;align-items:center;gap:12px;max-width:680px;margin-top:6px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 18px}
.tips-label{font-family:'Lilita One';background:linear-gradient(var(--dragon),var(--dragon2));color:#fff;
  padding:4px 12px;border-radius:8px;font-size:14px;flex:none}
.tips-text{font-weight:700;line-height:1.4;transition:opacity .3s}

/* points popup on phone */
.score-flash{font-family:'Lilita One';font-size:clamp(40px,12vw,80px);color:var(--gold1);text-shadow:0 3px 0 rgba(0,0,0,.35)}

.note{max-width:520px;text-align:center;line-height:1.5;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;padding:16px 18px;font-weight:700}
.note code{background:rgba(255,255,255,.14);padding:2px 6px;border-radius:6px;font-family:ui-monospace,monospace}
.demobar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:50}
.spinner{width:42px;height:42px;border-radius:50%;border:5px solid rgba(255,255,255,.25);border-top-color:#fff;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:var(--gold1)}

/* ---- Debug overlay (toggle with D on a keyboard) ---- */
#debug{position:fixed;top:0;right:0;width:min(460px,96vw);height:100dvh;z-index:9999;display:none;
  flex-direction:column;background:rgba(8,6,16,.95);backdrop-filter:blur(5px);border-left:1px solid #3a3160;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45;color:#d7e0ff;box-shadow:-12px 0 40px rgba(0,0,0,.5)}
#debug.open{display:flex}
#debug header{display:flex;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid #2a2448;background:#120e26}
#debug header b{flex:1;color:#fff;font-weight:700}
#debug button{font:inherit;border:1px solid #4a4180;background:#1d1740;color:#cfe;border-radius:8px;padding:6px 10px;cursor:pointer}
#debug button:hover{background:#2a2058}
#debug .status{padding:10px 12px;border-bottom:1px solid #2a2448;display:grid;grid-template-columns:auto 1fr;gap:3px 12px;max-height:34vh;overflow:auto}
#debug .status .k{color:#8ea2ff}
#debug .status .v{color:#fff;word-break:break-all}
#debug .status .v.bad{color:#ff7a85;font-weight:700}
#debug .status .v.good{color:#5ee6a0}
#debug .log{flex:1;overflow:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px}
#debug .e{border-left:3px solid #555;padding:4px 8px;background:rgba(255,255,255,.03);border-radius:0 6px 6px 0;white-space:pre-wrap;word-break:break-word}
#debug .e .t{color:#7c84a8;margin-right:6px}
#debug .e.info{border-color:#5b8cff}
#debug .e.ok{border-color:#3ddc84}
#debug .e.warn{border-color:#f3b53f;background:rgba(243,181,63,.08)}
#debug .e.error{border-color:#ff5a6a;background:rgba(255,90,106,.10);color:#ffd7db}
#debug .e .data{color:#9fb0d8;display:block;margin-top:2px}
#debug .hint{padding:8px 12px;color:#7c84a8;border-top:1px solid #2a2448}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, update, onValue, onDisconnect, increment, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =========================================================================
   CONFIG — paste your Firebase web config here.
   (apiKey is meant to be public in static sites; your DB security rules are
   what protect the data — see the rules block in the README.)
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCkO4K_JmCH4_6PKhF_43Uo6E8koxZHWZ8",
  authDomain: "drug-dragon-or-pokemon.firebaseapp.com",
  databaseURL: "https://drug-dragon-or-pokemon-default-rtdb.firebaseio.com",
  projectId: "drug-dragon-or-pokemon",
  storageBucket: "drug-dragon-or-pokemon.firebasestorage.app",
  messagingSenderId: "577951001199",
  appId: "1:577951001199:web:f9e7b65e96357edeb0fb9a"
};

const VERSION = "Biopsy v3";
let ROUNDS = 3;            // host can change this on the launch screen
const CONFIG_READY = !firebaseConfig.apiKey.startsWith("PASTE");

/* ---------- tiny helpers ---------- */
const app = document.getElementById("app");
const $ = (tag, props={}, ...kids) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props)){
    if (v===null || v===false || v===undefined) continue; // e.g. disabled:null → leave attribute off
    if (k==="class") e.className=v;
    else if (k==="html") e.innerHTML=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k,v);
  }
  for (const kid of kids.flat()) e.append(kid?.nodeType ? kid : document.createTextNode(kid));
  return e;
};
const clear = () => { app.innerHTML=""; };
const mount = (...nodes) => { clear(); app.append(...nodes); };
const setsEqual = (a,b) => a.size===b.size && [...a].every(x=>b.has(x));
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; };
const codeChars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
const roomCode = () => Array.from({length:4},()=>codeChars[(Math.random()*codeChars.length)|0]).join("");
const CAT_LABEL = {drug:"Drug", dragon:"Dragon", pokemon:"Pokémon"};
const CAT_CLASS = {drug:"drug", dragon:"dragon", pokemon:"poke"};
const labelsFor = set => set.size===0 ? [["None of them","none"]] : [...set].map(c=>[CAT_LABEL[c],CAT_CLASS[c]]);

const logo = () => $("div",{class:"logo"},
  $("div",{class:"ddp",html:'<b>Drug</b>, <i>Dragon</i> or <u>Pokémon</u>'}));

// quick count-up animation for score totals (easeOutCubic)
function animateCount(node, from, to, ms=850){
  from = Number(from)||0; to = Number(to)||0;
  if(from===to){ node.textContent=String(to); return; }
  const start = performance.now();
  const step = now => {
    const t = Math.min(1,(now-start)/ms);
    const e = 1 - Math.pow(1-t,3);
    node.textContent = String(Math.round(from + (to-from)*e));
    if(t<1) requestAnimationFrame(step); else node.textContent = String(to);
  };
  requestAnimationFrame(step);
}

/* ---------- audio + celebration ---------- */
let audioUnlocked = false;
function unlockAudio(){ audioUnlocked = true; }
["pointerdown","keydown","touchstart"].forEach(ev =>
  window.addEventListener(ev, unlockAudio, {once:true, passive:true}));

// play an mp3 by path (e.g. "sounds/dragon03.mp3"); fails quietly + logs
function playSound(path){
  if(!path) return;
  try{
    const a = new Audio(path); a.volume = 0.95;
    a.play().then(()=>dbg.info("Playing "+path))
            .catch(e=>dbg.warn("Sound blocked or missing: "+path+" ("+e.message+")"));
  }catch(e){ dbg.warn("Sound error "+path+": "+e.message); }
}

// discover numbered files sounds/<cat>01.mp3, <cat>02.mp3 … (stops at the first gap, cap 40)
async function probeSounds(cat, max=40){
  const found = [];
  for(let i=1;i<=max;i++){
    const url = "sounds/"+cat+String(i).padStart(2,"0")+".mp3";
    try{ const r = await fetch(url, {method:"HEAD", cache:"no-store"}); if(r.ok) found.push(url); else break; }
    catch(_){ break; }
  }
  return found;
}
async function probeAllSounds(){
  const cats = ["drug","dragon","pokemon"];
  const lists = await Promise.all(cats.map(c=>probeSounds(c)));
  const pools = {}; cats.forEach((c,i)=> pools[c]=lists[i]);
  dbg.ok("Reveal sounds found", {drug:pools.drug.length, dragon:pools.dragon.length, pokemon:pools.pokemon.length});
  return pools;
}
// choose one clip for a revealed card: random category it belongs to, random clip in that pool
function pickRevealSound(pools, correctSet){
  const cats = [...correctSet].filter(c=>pools[c] && pools[c].length);
  if(!cats.length) return "";
  const cat = cats[(Math.random()*cats.length)|0];
  const pool = pools[cat];
  return pool[(Math.random()*pool.length)|0];
}

function confettiBurst(){
  const cv = document.createElement("canvas");
  cv.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9000";
  document.body.appendChild(cv);
  const ctx = cv.getContext("2d");
  const dpr = Math.min(2, window.devicePixelRatio||1);
  const resize = () => { cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
  resize();
  const colors = ["#9b59d0","#f3902f","#ef4655","#f7d774","#3ddc84","#5b8cff"];
  const N = 140;
  const parts = Array.from({length:N},()=>{
    const pill = Math.random()<0.32;
    return {
      x: Math.random()*innerWidth, y: -20 - Math.random()*innerHeight*0.5,
      vx: (Math.random()-0.5)*1.4, vy: 2+Math.random()*3.2,
      rot: Math.random()*Math.PI, vr:(Math.random()-0.5)*0.3,
      size: pill ? 14+Math.random()*10 : 7+Math.random()*7,
      color: colors[(Math.random()*colors.length)|0], pill
    };
  });
  const start = performance.now(), life = 4600;
  (function frame(now){
    const t = now-start;
    ctx.clearRect(0,0,innerWidth,innerHeight);
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.04; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      if(p.pill){
        const w=p.size, h=p.size*0.46, r=h/2;
        ctx.fillStyle="#fff"; roundRect(ctx,-w/2,-h/2,w,h,r); ctx.fill();
        ctx.fillStyle=p.color;
        ctx.save(); ctx.beginPath(); roundRect(ctx,-w/2,-h/2,w,h,r); ctx.clip();
        ctx.fillRect(-w/2,-h/2,w/2,h); ctx.restore();
        ctx.lineWidth=1.2; ctx.strokeStyle="rgba(0,0,0,.25)"; roundRect(ctx,-w/2,-h/2,w,h,r); ctx.stroke();
      } else {
        ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      }
      ctx.restore();
    }
    if(t<life) requestAnimationFrame(frame); else cv.remove();
  })(start);
  addEventListener("resize", resize, {once:true});
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

/* =========================================================================
   DEBUG OVERLAY — press the D key (on a keyboard) to show/hide.
   Captures status + a rolling log of errors. "Copy all" → paste into chat.
   ========================================================================= */
const dbg = (() => {
  const logs = [];
  const state = {
    version:VERSION,
    mode:"—", room:"—", uid:"—", connected:"—", gameState:"lobby",
    configReady:String(typeof CONFIG_READY!=="undefined" && CONFIG_READY),
    online:String(navigator.onLine), XLSX:String(!!window.XLSX), QRCode:String(!!window.QRCode),
    projectId:(typeof firebaseConfig!=="undefined" ? firebaseConfig.projectId : "—"),
    url:location.href
  };
  const esc = s => String(s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
  const now = () => new Date().toLocaleTimeString();
  const badKeys = new Set(["connected","online","XLSX","QRCode","configReady"]);
  let root, statusEl, logEl, open=false;

  function build(){
    root = document.createElement("div"); root.id="debug";
    root.innerHTML =
      '<header><b>🐞 Debug</b>'+
      '<button data-copy>Copy all</button>'+
      '<button data-clear>Clear</button>'+
      '<button data-close>✕</button></header>'+
      '<div class="status"></div><div class="log"></div>'+
      '<div class="hint">Press D to hide · tap “Copy all” and paste the result into the chat</div>';
    document.body.appendChild(root);
    statusEl = root.querySelector(".status"); logEl = root.querySelector(".log");
    root.querySelector("[data-close]").onclick = () => toggle(false);
    root.querySelector("[data-clear]").onclick = () => { logs.length=0; renderLog(); };
    root.querySelector("[data-copy]").onclick = copyAll;
  }
  function renderStatus(){
    statusEl.innerHTML = Object.entries(state).map(([k,v])=>{
      let cls="v";
      if(k==="connected") cls += v===true?" good":(v===false?" bad":"");
      if(k==="configReady"||k==="XLSX"||k==="QRCode"||k==="online") cls += (v==="true"?" good":" bad");
      return '<span class="k">'+esc(k)+'</span><span class="'+cls+'">'+esc(v)+'</span>';
    }).join("");
  }
  function renderLog(){
    logEl.innerHTML = logs.map(e=>{
      const data = e.data!==undefined ? '<span class="data">'+esc(typeof e.data==="string"?e.data:JSON.stringify(e.data))+'</span>' : '';
      return '<div class="e '+e.level+'"><span class="t">'+esc(e.t)+'</span>'+esc(e.msg)+data+'</div>';
    }).join("");
    logEl.scrollTop = logEl.scrollHeight;
  }
  function log(level,msg,data){
    logs.push({t:now(),level,msg,data});
    if(logs.length>400) logs.shift();
    if(open) renderLog();
  }
  function set(k,v){ state[k]=v; if(open) renderStatus(); }
  function toggle(force){
    if(!root) build();
    open = (force===undefined) ? !open : force;
    root.classList.toggle("open", open);
    if(open){ renderStatus(); renderLog(); }
  }
  function copyAll(){
    const lines = ["=== Drug, Dragon, or Pokémon — debug dump ==="," "+now(),"","[STATUS]"];
    for(const [k,v] of Object.entries(state)) lines.push("  "+k+": "+v);
    lines.push("","[LOG] (oldest → newest)");
    for(const e of logs) lines.push("  ["+e.t+"] "+e.level.toUpperCase().padEnd(5)+" "+e.msg+
      (e.data!==undefined ? "  | "+(typeof e.data==="string"?e.data:JSON.stringify(e.data)) : ""));
    const text = lines.join("\n");
    const done = () => { const b=root.querySelector("[data-copy]"); const o=b.textContent; b.textContent="Copied ✓"; setTimeout(()=>b.textContent=o,1200); };
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done,()=>fallback(text,done)); }
    else fallback(text,done);
  }
  function fallback(text,done){
    const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); done(); }catch(_){ alert("Copy failed — select and copy manually:\n\n"+text); }
    ta.remove();
  }
  return {
    set,
    info:(m,d)=>log("info",m,d), ok:(m,d)=>log("ok",m,d),
    warn:(m,d)=>log("warn",m,d), err:(m,d)=>log("error",m,d),
    toggle
  };
})();

// Public Google Sheet holding the Drug / Dragon / Pokemon / None columns.
// "Anyone with the link can view" is enough — we read it as CSV from the client.
const SHEET_ID = "14QRBIEfRulcKwJziFtSzBcg2O-Wkg5-t3fYx2r_r1mI";
const SHEET_URLS = [
  "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv",
  "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/export?format=csv"
];
async function fetchSheetCsv(){
  let lastErr;
  for(const url of SHEET_URLS){
    try{
      const r = await fetch(url, {cache:"no-store"});
      if(!r.ok){ dbg.warn("Sheet fetch HTTP "+r.status); lastErr=new Error("HTTP "+r.status); continue; }
      const text = await r.text();
      const head = text.slice(0,200).toLowerCase();
      if(head.includes("<!doctype") || head.includes("<html")){   // got a sign-in / error page, not CSV
        dbg.warn("Sheet returned HTML, not CSV (likely needs Publish-to-web)"); lastErr=new Error("got HTML not CSV"); continue;
      }
      if(text && text.length>1) return text;
    }catch(e){ dbg.warn("Sheet fetch blocked: "+e.message); lastErr=e; }
  }
  throw lastErr || new Error("Could not read the Google Sheet");
}
async function loadSheet(){
  if(!window.XLSX){ dbg.err("XLSX library not loaded — the SheetJS CDN may be blocked"); throw new Error("XLSX missing"); }
  let csv;
  try{ csv = await fetchSheetCsv(); }
  catch(e){
    dbg.err("Google Sheet could not be read — check it's shared 'Anyone with the link can view'. "+
            "If CORS blocks it, use File → Share → Publish to web → CSV and swap that URL in. ("+e.message+")", {sheet:SHEET_ID});
    throw e;
  }
  const wb = XLSX.read(csv, {type:"string"});
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
  const map = new Map(); // displayName -> Set(categories)
  const add = (val, cat) => {
    if(val==null) return; const name=String(val).trim(); if(!name) return;
    if(!map.has(name)) map.set(name,new Set());
    if(cat) map.get(name).add(cat);
  };
  // columns: A=Drug, B=Dragon, C=Pokemon, D=None. A name in two columns of one row = a Double.
  for(let i=1;i<rows.length;i++){ const row=rows[i]||[];
    add(row[0],"drug"); add(row[1],"dragon"); add(row[2],"pokemon"); add(row[3],null); }
  const doubles = [...map.values()].filter(s=>s.size>=2).length;
  dbg.ok("Google Sheet parsed", {candidates:map.size, doubles});
  return map; // keys() = every candidate name
}

let db, uid;
async function initFirebase(){
  dbg.info("Initializing Firebase…", {projectId:firebaseConfig.projectId, hasDatabaseURL:!!firebaseConfig.databaseURL});
  if(!firebaseConfig.databaseURL) dbg.warn("No databaseURL in config — Realtime Database calls will fail");
  let fb, auth;
  try{
    fb = initializeApp(firebaseConfig);
    db = getDatabase(fb);
    auth = getAuth(fb);
  }catch(e){ dbg.err("Firebase init failed: "+e.message, {code:e.code}); throw e; }
  try{
    await signInAnonymously(auth);
  }catch(e){
    dbg.err("Anonymous sign-in failed — is Anonymous auth enabled in the console? ("+e.message+")", {code:e.code});
    throw e;
  }
  uid = await new Promise(res => onAuthStateChanged(auth, u => u && res(u.uid)));
  dbg.set("uid", uid); dbg.ok("Signed in anonymously", {uid});
  onValue(ref(db, ".info/connected"), s => dbg.set("connected", s.val()===true));
}

/* ---------------- HOST ---------------- */
async function runHost(){
  loading("Setting up the table…");
  dbg.set("mode","HOST");
  await initFirebase();
  const [nameMap, wutdis, tips, soundPools] = await Promise.all([loadSheet(), loadWutdis(), loadTips(), probeAllSounds(), loadNames().catch(()=>[])]);
  const code = roomCode();
  const url = location.origin + location.pathname + "?room=" + code;
  dbg.set("room", code);
  const roomRef = ref(db, "rooms/"+code);
  try{
    await set(roomRef, { meta:{ state:"lobby", round:0, hostUid:uid, createdAt:serverTimestamp() } });
    dbg.ok("Room created", {code});
  }catch(e){
    dbg.err("Room create write failed — check Realtime Database rules are PUBLISHED ("+e.message+")", {code:e.code, path:"rooms/"+code});
    throw e;
  }
  onDisconnect(roomRef).remove();   // tidy the room up when the host screen closes

  const maxRounds = Math.max(1, Math.min(20, nameMap.size));   // can't have more rounds than candidate names
  ROUNDS = Math.min(ROUNDS, maxRounds);                        // host-chosen, starts at the default
  let candidates = [];                                         // picked when the game actually starts
  dbg.info("Sheet ready", {candidates:nameMap.size, maxRounds});

  // tips ticker — cycles every 5s while the launch screen is up
  let tipIdx = 0, currentTip = tips[0] || "";
  if(tips.length>1) setInterval(()=>{
    const el = document.getElementById("tip");
    if(el){ tipIdx=(tipIdx+1)%tips.length; currentTip=tips[tipIdx]; el.textContent=currentTip; }
  }, 5000);

  let players = {};        // live snapshot
  let roster = [];         // uids frozen at game start
  let state = "lobby";
  let started = false;
  const revealed = new Set();

  const drawLobby = () => renderHostLobby({
    code, url, players, rounds:ROUNDS, maxRounds, tip:currentTip,
    onRounds:(n)=>{ ROUNDS = Math.max(1, Math.min(maxRounds, n)); dbg.info("Rounds set to "+ROUNDS); drawLobby(); }
  });

  onValue(ref(db,"rooms/"+code+"/players"), snap=>{
    players = snap.val()||{};
    if(state==="lobby"){
      drawLobby();
      const arr = Object.values(players);
      if(!started && arr.length>=1 && arr.every(p=>p.accepted)) startGame();
    }
  });

  function startGame(){
    started = true; state = "question";
    roster = Object.keys(players);
    // pick this game's mystery names now that the round count is locked (host-side only)
    candidates = shuffle([...nameMap.keys()]).slice(0, ROUNDS);
    while(candidates.length < ROUNDS && nameMap.size) candidates.push(candidates[candidates.length-1]);
    update(roomRef, { "meta/rounds": ROUNDS });
    dbg.info("All players accepted — starting game", {roster:roster.length, rounds:ROUNDS, candidates});
    dbg.set("roster", roster.length);
    beginRound(0);
  }

  function beginRound(r){
    const name = candidates[r];
    const prompt = wutdis[(Math.random()*wutdis.length)|0];
    dbg.info("Round "+(r+1)+" begins", {name, prompt});
    dbg.set("gameState", "question r"+r);
    update(roomRef, { "meta/state":"question", "meta/round":r, "meta/name":name, "meta/prompt":prompt,
                      "meta/roundStartAt":serverTimestamp(), "meta/reveal":null })
      .catch(e=>dbg.err("beginRound write failed: "+e.message,{code:e.code}));
    renderHostQuestion({round:r, name, prompt, answered:0, total:roster.length});
    onValue(ref(db,"rooms/"+code+"/answers/"+r), snap=>{
      const ans = snap.val()||{};
      const answered = roster.filter(u=>ans[u]).length;
      if(state==="question") renderHostQuestion({round:r, name, prompt, answered, total:roster.length});
      if(answered>=roster.length && roster.length>0) revealRound(r, ans, name);
    });
  }

  async function revealRound(r, ans, name){
    if(revealed.has(r)) return; revealed.add(r); state="reveal";
    dbg.set("gameState", "reveal r"+r);
    const correctSet = nameMap.get(name) || new Set();
    const correctLabels = labelsFor(correctSet);
    // Doubles (name in two columns, e.g. Charizard = dragon + pokemon) are worth 400. Singles & "none" are 100.
    const base = correctSet.size >= 2 ? 400 : 100;
    // who was exactly right, ordered by submit time → bonuses
    const correct = roster.filter(u=>ans[u] && setsEqual(new Set(ans[u].picks||[]), correctSet))
                          .sort((a,b)=>(ans[a].at||0)-(ans[b].at||0));
    const bonus = [50,25];
    const pointsByUid = {};
    correct.forEach((u,i)=> pointsByUid[u] = base + (bonus[i]||0));
    dbg.info("Scoring round "+(r+1), {name, correct:[...correctSet], exactlyRight:correct.length, base});
    // snapshot totals BEFORE the increment write so the scoreboard can count up
    const oldTotals = {};
    roster.forEach(u => oldTotals[u] = players[u]?.score || 0);
    const soundPath = pickRevealSound(soundPools, correctSet);
    const updates = { "meta/state":"reveal", "meta/reveal":{ name, correctLabels, sound:soundPath } };
    roster.forEach(u=>{
      const pts = pointsByUid[u]||0;
      if(pts>0) updates["players/"+u+"/score"] = increment(pts);
      if(ans[u]){ updates["answers/"+r+"/"+u+"/points"]=pts; updates["answers/"+r+"/"+u+"/correct"]=pts>0; }
    });
    try{ await update(roomRef, updates); }
    catch(e){ dbg.err("Score write failed (host write permission?): "+e.message, {code:e.code}); }
    playSound(soundPath);   // category sound on the host (phones play the same path from meta)
    const scoreRows = roster.map(u=>{
        const delta = pointsByUid[u]||0;
        return { name:players[u]?.name||"???", old:oldTotals[u], new:oldTotals[u]+delta, delta };
      }).sort((a,b)=> b.new-a.new || b.delta-a.delta);
    renderHostReveal({ round:r, name, correctLabels, scoreRows, isLast:r+1>=ROUNDS,
      onNext: ()=> r+1>=ROUNDS ? endGame() : (state="question", beginRound(r+1)) });
  }

  async function endGame(){
    state="ended";
    await update(roomRef,{ "meta/state":"ended" });
    const snap = await get(ref(db,"rooms/"+code+"/players"));
    const ps = snap.val()||{};
    const leaderboard = roster.map(u=>({name:ps[u]?.name||"???", score:ps[u]?.score||0}))
                              .sort((a,b)=>b.score-a.score);
    renderHostEnded({leaderboard});
    playSound("sounds/final.mp3");   // final fanfare
    confettiBurst();                 // confetti only here, at the very end
  }
}

/* ---------------- PLAYER ---------------- */
async function runPlayer(code){
  loading("Connecting to game…");
  dbg.set("mode","PLAYER"); dbg.set("room", code);
  await initFirebase();
  const roomRef = ref(db,"rooms/"+code);
  const metaSnap = await get(ref(db,"rooms/"+code+"/meta"));
  if(!metaSnap.exists()){ dbg.warn("No game found for code "+code); return mount(logo(), $("div",{class:"note"},"No game found for code ",$("b",{},code),". Check the screen and scan again.")); }
  if(metaSnap.val().state!=="lobby"){ dbg.warn("Game already in progress (state="+metaSnap.val().state+")"); return mount(logo(), $("div",{class:"note"},"This game has already started. Catch the next one!")); }

  const names = await loadNames();
  const meRef = ref(db,"rooms/"+code+"/players/"+uid);

  const takenNames = async () => {
    const s = await get(ref(db,"rooms/"+code+"/players"));
    return new Set(Object.entries(s.val()||{}).filter(([k])=>k!==uid).map(([,v])=>v.name));
  };
  const freeName = async (exclude) => {
    const taken = await takenNames();
    if(exclude) taken.add(exclude);
    const open = shuffle(names.filter(n=>!taken.has(n)));
    return open[0] || (names[(Math.random()*names.length)|0]+" "+((Math.random()*99)|0));
  };

  let myName = await freeName();
  let accepted = false, locked = false, lastRound = -1;
  let lastSoundRound = -1, endedOnce = false;
  let picks = new Set();
  try{
    await set(meRef, { name:myName, accepted:false, score:0, joinedAt:serverTimestamp() });
    dbg.ok("Joined lobby as "+myName);
  }catch(e){
    dbg.err("Join write failed (rules?): "+e.message, {code:e.code, path:"players/"+uid});
    return mount(logo(), $("div",{class:"note"},"Couldn't join — open the debug panel for details."));
  }
  onDisconnect(meRef).remove();

  const drawLobby = () => renderPhoneLobby({
    name:myName, accepted,
    onRefresh: async ()=>{ myName = await freeName(myName); update(meRef,{name:myName}).catch(e=>dbg.err("Name refresh failed: "+e.message,{code:e.code})); dbg.info("Picked new name", {myName}); drawLobby(); },
    onAccept: async ()=>{ accepted=true; update(meRef,{accepted:true}).catch(e=>dbg.err("Accept failed: "+e.message,{code:e.code})); dbg.info("Accepted name"); drawLobby(); }
  });
  drawLobby();

  // react to game state
  onValue(ref(db,"rooms/"+code+"/meta"), snap=>{
    const m = snap.val(); if(!m){ dbg.warn("Room closed by host"); return mount(logo(),$("div",{class:"note"},"The host closed the game.")); }
    dbg.set("gameState", m.state + (m.round!=null? " r"+m.round : ""));
    if(m.state==="lobby"){ if(!accepted) drawLobby(); return; }
    if(m.state==="question"){
      if(m.round!==lastRound){ lastRound=m.round; picks=new Set(); locked=false; }
      drawQuestion(m);
    }
    if(m.state==="reveal") drawReveal(m);
    if(m.state==="ended") drawEnded();
  });

  function drawQuestion(m){
    renderPhoneQuestion({
      round:m.round, name:m.name, prompt:m.prompt, picks, locked,
      onToggle:(cat)=>{ if(locked) return; picks.has(cat)?picks.delete(cat):picks.add(cat); drawQuestion(m); },
      onSubmit: async ()=>{
        if(locked) return; locked=true;
        dbg.info("Submitting answer", {round:m.round, picks:[...picks]});
        try{
          await set(ref(db,"rooms/"+code+"/answers/"+m.round+"/"+uid), {picks:[...picks], at:serverTimestamp()});
          dbg.ok("Answer submitted", {round:m.round});
        }catch(e){
          locked=false; // let them retry
          dbg.err("Submit write failed (rules?): "+e.message, {code:e.code, path:"answers/"+m.round+"/"+uid});
        }
        drawQuestion(m);
      }
    });
  }
  async function drawReveal(m){
    const rv = m.reveal||{correctLabels:[]};
    const a = (await get(ref(db,"rooms/"+code+"/answers/"+m.round+"/"+uid))).val()||{};
    const score = (await get(ref(db,"rooms/"+code+"/players/"+uid+"/score"))).val()||0;
    renderPhoneReveal({ name:rv.name, correctLabels:rv.correctLabels||[], gotIt:!!a.correct, points:a.points||0, total:score });
    if(m.round!==lastSoundRound){ lastSoundRound=m.round; playSound(rv.sound); }  // same clip the host chose, once
  }
  async function drawEnded(){
    const ps = (await get(ref(db,"rooms/"+code+"/players"))).val()||{};
    const board = Object.values(ps).sort((a,b)=>(b.score||0)-(a.score||0));
    const me = ps[uid]||{name:myName,score:0};
    const place = board.findIndex(p=>p.name===me.name && p.score===me.score)+1;
    renderPhoneEnded({ name:me.name, score:me.score||0, place:place||board.length, count:board.length });
    if(!endedOnce){ endedOnce=true; playSound("sounds/final.mp3"); confettiBurst(); }
  }
}

/* =========================================================================
   DEMO MODE — preview every screen without Firebase  (?demo=host | ?demo=phone)
   ========================================================================= */
function runDemo(kind){
  const bar = document.getElementById("demobar"); bar.classList.remove("hidden");
  let i = 0; let screens;
  if(kind==="host"){
    screens = [
      ()=>renderHostLobby({code:"WXYZ", url:location.origin+location.pathname+"?room=WXYZ",
        players:{a:{name:"Captain Wiggles",accepted:true}, b:{name:"Old Greg",accepted:true}, c:{name:"Susan Doom",accepted:false}},
        rounds:3, maxRounds:10, onRounds:()=>{}, tip:"Doubles are worth 400 points. Singles are worth 100."}),
      ()=>renderHostQuestion({round:0, name:"Charizard", prompt:"Is your Mom taking this?", answered:2, total:3}),
      ()=>renderHostReveal({round:0, name:"Charizard",
        correctLabels:[["Dragon","dragon"],["Pokémon","poke"]],
        scoreRows:[{name:"Old Greg",old:125,new:575,delta:450},{name:"Captain Wiggles",old:100,new:525,delta:425},{name:"Susan Doom",old:200,new:200,delta:0}],
        isLast:false, onNext:next}),
      ()=>renderHostQuestion({round:1, name:"Ozempic", prompt:"Any guesses?", answered:1, total:3}),
      ()=>{ renderHostEnded({leaderboard:[{name:"Old Greg",score:575},{name:"Captain Wiggles",score:525},{name:"Susan Doom",score:200}]}); confettiBurst(); playSound("sounds/final.mp3"); }
    ];
  } else {
    screens = [
      ()=>renderPhoneLobby({name:"Baron von Snacc",accepted:false,onRefresh:()=>{},onAccept:next}),
      ()=>renderPhoneLobby({name:"Baron von Snacc",accepted:true}),
      ()=>{ const p=new Set(["dragon"]); renderPhoneQuestion({round:0,name:"Charizard",prompt:"What is this thing?",picks:p,locked:false,
        onToggle:(c)=>{p.has(c)?p.delete(c):p.add(c); screens[i]=()=>renderPhoneQuestion({round:0,name:"Charizard",prompt:"What is this thing?",picks:p,locked:false,onToggle:()=>{},onSubmit:next}); screens[i]();},
        onSubmit:next}); },
      ()=>renderPhoneReveal({name:"Charizard",correctLabels:[["Dragon","dragon"],["Pokémon","poke"]],gotIt:true,points:250,total:250}),
      ()=>renderPhoneEnded({name:"Baron von Snacc",score:350,place:2,count:3})
    ];
  }
  function next(){ i=(i+1)%screens.length; render(); }
  function render(){ screens[i](); }
  bar.innerHTML=""; bar.append($("button",{class:"btn",onClick:next},"Demo: next screen ▸"));
  render();
}

/* =========================================================================
   BOOT
   ========================================================================= */
const params = new URLSearchParams(location.search);
const demo = params.get("demo");
const room = params.get("room");

window.addEventListener("DOMContentLoaded", () => {
  dbg.info("Boot", {demo:demo||null, room:room||null, configReady:CONFIG_READY, online:navigator.onLine,
    XLSX:!!window.XLSX, QRCode:!!window.QRCode, ua:navigator.userAgent});
  if(!window.XLSX) dbg.warn("XLSX (SheetJS) not present at boot — CDN may be blocked");
  if(!window.QRCode) dbg.warn("QRCode library not present at boot — CDN may be blocked");
  try{
    if(demo) return runDemo(demo==="phone"?"phone":"host");
    if(!CONFIG_READY){
      dbg.warn("Firebase config not filled in — running in placeholder mode");
      return mount(logo(),
        $("div",{class:"note",html:
          "Add your Firebase config near the top of <code>index.html</code> to go live.<br><br>"+
          "Want to preview the look right now? Open "+
          "<a href='?demo=host'>?demo=host</a> or <a href='?demo=phone'>?demo=phone</a>."}));
    }
    if(room) runPlayer(room.toUpperCase());
    else runHost();
  }catch(e){
    dbg.err("Boot crash: "+e.message, {stack:(e.stack||"").split("\n").slice(0,3).join(" | ")});
    mount(logo(), $("div",{class:"note"}, "Something broke: "+e.message+" — press D for details."));
    console.error(e);
  }
});
